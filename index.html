<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css" />
  <title>WEATHER WEBPAGE</title>
</head>

<body>
  <div class="weather-card">
     <h1>Hello Weather</h1>
    
    <form onsubmit="getWeather(event)">
      <input id="city-input" class="button-84" type="text" placeholder="enter your city here" />
      <button class="button-14" type="submit">Get Weather</button>
    </form>
    
    <div class="header">
      <img src="" id="weather-icon" alt="weather icon" />
      <h3 id="weather-term"></h3>
    </div>
    
    <div class="temperature">
      <h2 id="temp-result"></h2>
    <p id="fl-result" class="feelslike"></p>
    </div>
    
    <div class="weather-details">
      <h4 id="humidity-result"></h4>
      <h4 id="wind-result"></h4>
      <h4 id="precipitation-percentage"></h4>
    </div>
  </div>
  
  
  <audio id="sparrow-chirping" src="./bird chirping.wav"></audio>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.17.0/dist/axios.min.js">
  </script>
  <script src="./script.js"></script>
</body>

</html>
